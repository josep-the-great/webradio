<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Internet Radio</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #1db954;
      color: white;
      cursor: pointer;
    }

    #results, #playlistStations {
      margin-top: 15px;
      max-height: 300px;
      overflow-y: auto;
    }

    .station {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .station:hover {
      background: #222;
    }

    .playlist-box {
      margin-top: 20px;
      border-top: 1px solid #333;
      padding-top: 15px;
    }

    audio {
      margin-top: 20px;
      width: 90%;
    }
  </style>
</head>
<body>

<h1>🌐 Internet Radio</h1>

<!-- Manual URL -->
<input id="streamUrl" placeholder="Stream URL">
<button onclick="playStream()">Play</button>

<br>

<!-- Search -->
<input id="search" placeholder="Search stations">
<button onclick="searchStations()">Search</button>

<div id="results"></div>

<!-- Playlist Controls -->
<div class="playlist-box">
  <h2>📻 Playlists</h2>

  <input id="playlistId" placeholder="Enter or create playlist ID">
  <button onclick="createPlaylist()">Create / Load</button>

  <button onclick="savePlaylist()">Save Playlist</button>

  <div id="playlistStations"></div>
</div>

<audio id="player" controls></audio>

<script>
const player = document.getElementById("player");

let currentPlaylistId = null;
let currentPlaylist = [];

// Play manual URL
function playStream() {
  const url = document.getElementById("streamUrl").value;
  player.src = url;
  player.play();
}

// Search stations
async function searchStations() {
  const query = document.getElementById("search").value;

  const res = await fetch(
    `https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(query)}`
  );

  const stations = await res.json();

  const results = document.getElementById("results");
  results.innerHTML = "";

  stations.slice(0, 20).forEach(station => {
    const div = document.createElement("div");
    div.className = "station";
    div.textContent = `${station.name} (${station.country})`;

    // Click = play
    div.onclick = () => {
      player.src = station.url_resolved;
      player.play();
    };

    // Right-click = add to playlist
    div.oncontextmenu = (e) => {
      e.preventDefault();
      addToPlaylist(station);
    };

    results.appendChild(div);
  });
}

// Create or load playlist
function createPlaylist() {
  const id = document.getElementById("playlistId").value.trim();
  if (!id) return alert("Enter a playlist ID");

  currentPlaylistId = id;

  const saved = localStorage.getItem("playlist_" + id);
  currentPlaylist = saved ? JSON.parse(saved) : [];

  renderPlaylist();
}

// Add station
function addToPlaylist(station) {
  if (!currentPlaylistId) {
    alert("Create or load a playlist first!");
    return;
  }

  currentPlaylist.push({
    name: station.name,
    url: station.url_resolved,
    country: station.country
  });

  renderPlaylist();
}

// Save playlist
function savePlaylist() {
  if (!currentPlaylistId) return;

  localStorage.setItem(
    "playlist_" + currentPlaylistId,
    JSON.stringify(currentPlaylist)
  );

  alert("Playlist saved!");
}

// Render playlist
function renderPlaylist() {
  const container = document.getElementById("playlistStations");
  container.innerHTML = "";

  currentPlaylist.forEach((station, index) => {
    const div = document.createElement("div");
    div.className = "station";

    div.textContent = `${station.name} (${station.country})`;

    div.onclick = () => {
      player.src = station.url;
      player.play();
    };

    // Remove option
    div.oncontextmenu = (e) => {
      e.preventDefault();
      currentPlaylist.splice(index, 1);
      renderPlaylist();
    };

    container.appendChild(div);
  });
}
</script>

</body>
</html>
