<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloud Radio</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #1db954;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #17a44a;
    }

    .station {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .station:hover {
      background: #222;
    }

    #results, #playlistStations {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 10px;
    }

    audio {
      width: 90%;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🌐 Cloud Radio</h1>

<!-- Stream -->
<input id="streamUrl" placeholder="Stream URL">
<button onclick="playStream()">Play</button>

<br>

<!-- Search -->
<input id="search" placeholder="Search stations">
<button onclick="searchStations()">Search</button>

<div id="results"></div>

<hr>

<h2>📻 Playlist</h2>

<input id="playlistId" placeholder="playlist id (e.g. paper-timer-waller)">
<button onclick="loadPlaylist()">Load</button>
<button onclick="savePlaylist()">Save</button>

<div id="playlistStations"></div>

<audio id="player" controls></audio>

<script>
const SUPABASE_URL = "https://owczhxgjehximnjzmbxl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93Y3poeGdqZXhoaW1nanptYnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDE2NTgsImV4cCI6MjA5MTY3NzY1OH0.fL66LUm-xI7R7SP7E_y9TDjG-AFK7IixlNboVYr_T3A";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const player = document.getElementById("player");

let currentPlaylist = [];
let currentPlaylistId = null;

// Play manual URL
function playStream() {
  const url = document.getElementById("streamUrl").value.trim();
  if (!url) return;

  player.src = url;
  player.play().catch(() => {
    alert("Click play to start audio");
  });
}

// Search stations
async function searchStations() {
  const query = document.getElementById("search").value.trim();
  if (!query) return;

  const results = document.getElementById("results");
  results.innerHTML = "Searching...";

  try {
    const res = await fetch(
      `https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(query)}`
    );

    const stations = await res.json();

    results.innerHTML = "";

    stations.slice(0, 20).forEach(station => {
      const div = document.createElement("div");
      div.className = "station";
      div.textContent = station.name + " (" + station.country + ")";

      // Play
      div.onclick = () => {
        player.src = station.url_resolved;
        player.play().catch(() => {
          alert("Click play to start audio");
        });
      };

      // Right-click = add to playlist
      div.oncontextmenu = (e) => {
        e.preventDefault();
        addToPlaylist(station);
      };

      results.appendChild(div);
    });

    if (stations.length === 0) {
      results.innerHTML = "No stations found.";
    }

  } catch (err) {
    console.error(err);
    results.innerHTML = "Error loading stations.";
  }
}

// Add to playlist
function addToPlaylist(station) {
  if (!currentPlaylistId) {
    alert("Load or create a playlist first");
    return;
  }

  currentPlaylist.push({
    name: station.name,
    url: station.url_resolved,
    country: station.country
  });

  renderPlaylist();
}

// Save to cloud
async function savePlaylist() {
  if (!currentPlaylistId) return alert("Enter playlist ID");

  const { error } = await supabaseClient
    .from("playlists")
    .upsert({
      id: currentPlaylistId,
      data: currentPlaylist
    });

  if (error) {
    alert("Error saving playlist");
    console.error(error);
  } else {
    alert("✅ Playlist saved to cloud!");
  }
}

// Load from cloud
async function loadPlaylist() {
  const id = document.getElementById("playlistId").value.trim();
  if (!id) return;

  currentPlaylistId = id;

  const { data, error } = await supabaseClient
    .from("playlists")
    .select("*")
    .eq("id", id)
    .single();

  if (data) {
    currentPlaylist = data.data;
  } else {
    currentPlaylist = [];
  }

  renderPlaylist();
}

// Render playlist
function renderPlaylist() {
  const container = document.getElementById("playlistStations");
  container.innerHTML = "";

  currentPlaylist.forEach((station, index) => {
    const div = document.createElement("div");
    div.className = "station";

    div.textContent = station.name + " (" + station.country + ")";

    div.onclick = () => {
      player.src = station.url;
      player.play();
    };

    // Right-click remove
    div.oncontextmenu = (e) => {
      e.preventDefault();
      currentPlaylist.splice(index, 1);
      renderPlaylist();
    };

    container.appendChild(div);
  });
}

// Auto-load playlist from URL
window.onload = () => {
  const hash = window.location.hash.substring(1);
  if (hash) {
    document.getElementById("playlistId").value = hash;
    loadPlaylist();
  }
};
</script>

</body>
</html>
