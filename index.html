<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Internet Radio</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    input {
      width: 250px;
    }

    button {
      background: #1db954;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #17a44a;
    }

    #results {
      margin-top: 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .station {
      padding: 12px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .station:hover {
      background: #222;
    }

    audio {
      margin-top: 20px;
      width: 90%;
    }
  </style>
</head>
<body>

  <h1>🌐 Internet Radio</h1>

  <!-- Manual URL -->
  <div>
    <input id="streamUrl" placeholder="Enter stream URL">
    <button onclick="playStream()">Play URL</button>
  </div>

  <!-- Search -->
  <div>
    <input id="search" placeholder="Search stations">
    <button onclick="searchStations()">Search</button>
  </div>

  <!-- Results -->
  <div id="results"></div>

  <!-- Player -->
  <audio id="player" controls></audio>

  <script>
    const player = document.getElementById("player");

    function playStream() {
      const url = document.getElementById("streamUrl").value.trim();
      if (!url) return;

      player.src = url;
      player.play().catch(() => {
        alert("Playback blocked. Click play on the player.");
      });
    }

    async function searchStations() {
      const query = document.getElementById("search").value.trim();
      if (!query) return;

      const results = document.getElementById("results");
      results.innerHTML = "Searching...";

      try {
        const res = await fetch(
          `https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(query)}`
        );

        const stations = await res.json();

        results.innerHTML = "";

        stations.slice(0, 20).forEach(station => {
          const div = document.createElement("div");
          div.className = "station";

          div.textContent = `${station.name} (${station.country})`;

          div.onclick = () => {
            player.src = station.url_resolved;
            player.play().catch(() => {
              alert("Click play to start audio.");
            });
          };

          results.appendChild(div);
        });

        if (stations.length === 0) {
          results.innerHTML = "No stations found.";
        }

      } catch (err) {
        results.innerHTML = "Error loading stations.";
        console.error(err);
      }
    }
  </script>

</body>
</html>
